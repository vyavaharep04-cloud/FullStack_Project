<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <link rel="stylesheet" href="landingpagestyle.css">
</head>

<body>

    <!-- HEADER -->
    <header class="main-header">
        <img src="image/FinanTra_logo (2).png" alt="FinanTra Logo" class="logo">
        <h1 class="brandtitle">Finan<span>Tra</span>
        </h1>
    </header>

    <!-- LOGIN AREA -->
    <div class="loginSection">

        <!-- SIGN IN CARD -->
        <div class="loginCard">
            <h2>Sign In</h2>

            <form class="loginForm">
                <label for="user">Email or Username</label>
                <input type="text" id="user" placeholder="Enter email or username">

                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <button type="button" class="signin-btn" onclick="handleSignIn()"> Sign In</button>

                <div class="links">
                    <a href="password.html">Forgot Password?</a>
                    <a href="createAcc.html">Create Account</a>
                </div>
            </form>
        </div>

        <!-- OR SEPARATOR -->
        <div class="separator">
            <span>OR</span>
        </div>

        <!-- GUEST BUTTON -->
        <button class="guest-btn">Continue as Guest</button>

        <!-- QUOTE -->
        <p class="quote">
            Manage your income and expenses in one place.
        </p>

    </div>

</body>
</html>
