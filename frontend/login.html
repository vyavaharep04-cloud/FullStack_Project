<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" href="image/FinanTra_logo (2).png" type="image/png">
</head>

<body>

    <!-- HEADER -->
    <header class="main-header">
        <img src="image/FinanTra_logo (2).png" alt="FinanTra Logo" class="logo">
        <h1 class="brandtitle">Finan<span>Tra</span>
        </h1>
    </header>

    <!-- LOGIN AREA -->
    <section class="auth-section">

        <!-- SIGN IN CARD -->
        <div class="auth-card">
            <h2>Sign In</h2>

            <form class="auth-form loginForm">
                <label for="user">Email</label>
                <input type="email" id="user" placeholder="Enter email">

                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <button type="submit" class="auth-btn" > Sign In</button>

                <div class="links">
                    <a href="password.html">Forgot Password?</a>
                    <a href="createAcc.html">Create Account</a>
                </div>
            </form>
        </div>

        <!-- OR SEPARATOR -->
        <div class="separator">
            <span>OR</span>
        </div>

        <!-- GUEST BUTTON -->
        <button class="guest-btn">Continue as Guest</button>

        <!-- QUOTE -->
        <p class="quote">
            Manage your income and expenses in one place.
        </p>

    </section>
    <footer class="main-footer">
    © 2026 FinanTra | Track • Save • Grow
    </footer>
    <script src="js/dataService.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
