<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- dashboard background -->

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#54a5bb"/>
<stop offset="100%" stop-color="#0c2d2d"/>
</linearGradient>

<!-- card background -->

<linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#203f49"/>
<stop offset="100%" stop-color="#162e36"/>
</linearGradient>

<!-- glow effect -->

<filter id="glow">
<feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

<!-- shadow -->

<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#00000055"/>
</filter>

</defs>

<!-- background -->

<rect width="640" height="400" rx="22" fill="url(#bg)"/>

<!-- main dashboard -->

<rect x="120" y="80" width="400" height="240" rx="18"
fill="url(#card)" filter="url(#shadow)"/>

<!-- balance card -->

<rect x="140" y="100" width="360" height="70" rx="12"
fill="#0f2f38"/>

<text x="160" y="125" font-size="16" fill="#9ccfd8">
Total Balance
</text>

<text x="160" y="155" font-size="30" font-weight="bold" fill="#5eead4">
₹52,400
</text>

<!-- income chart -->

<rect x="140" y="190" width="170" height="95" rx="12"
fill="#0b2026"/>

<text x="155" y="210" font-size="14" fill="#9ccfd8">
Income
</text>

<polyline
points="155,255 180,230 205,235 230,205 255,215 290,195"
fill="none"
stroke="#5eead4"
stroke-width="3"
filter="url(#glow)"
/>

<!-- expenses chart -->

<rect x="330" y="190" width="170" height="95" rx="12"
fill="#0b2026"/>

<text x="345" y="210" font-size="14" fill="#9ccfd8">
Expenses
</text>

<rect x="355" y="235" width="16" height="40" fill="#38bdf8"/>
<rect x="385" y="220" width="16" height="55" fill="#38bdf8"/>
<rect x="415" y="230" width="16" height="45" fill="#38bdf8"/>
<rect x="445" y="205" width="16" height="70" fill="#38bdf8"/>

<!-- transaction list -->

<rect x="140" y="300" width="360" height="60" rx="12"
fill="#0f2f38"/>

<text x="160" y="325" font-size="13" fill="#cbd5e1">
Groceries
</text>

<text x="450" y="325" font-size="13" fill="#f87171">
-₹800
</text>

<text x="160" y="345" font-size="13" fill="#cbd5e1">
Salary
</text>

<text x="450" y="345" font-size="13" fill="#4ade80">
+₹35,000
</text>

<!-- floating savings card -->

<rect x="420" y="40" width="150" height="65" rx="14"
fill="#0f2f38" filter="url(#shadow)"/>

<text x="440" y="70" font-size="14" fill="#9ccfd8">
Savings
</text>

<text x="440" y="95" font-size="22" fill="#4ade80">
+12%
</text>

</svg>
