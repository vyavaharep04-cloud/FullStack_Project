<svg width="520" height="340" viewBox="0 0 520 340" xmlns="http://www.w3.org/2000/svg">

<rect width="520" height="340" rx="18" fill="#ffffff" stroke="#d9e7ec"/>

<!-- Balance Card -->

<rect x="20" y="20" width="480" height="70" rx="12" fill="#e9f7fb"/>
<text x="40" y="50" font-size="16" fill="#1f82a6">Total Balance</text>
<text x="40" y="75" font-size="24" font-weight="bold" fill="#0f91b5">₹52,400</text>

<!-- Chart Area -->

<rect x="20" y="110" width="230" height="120" rx="10" fill="#f4fbfe"/>
<text x="30" y="130" font-size="14" fill="#1f82a6">Income Trend</text>

<polyline 
points="30,200 70,170 110,180 150,140 190,150 230,130"
fill="none"
stroke="#0f91b5"
stroke-width="3"
/>

<!-- Expense Chart -->

<rect x="270" y="110" width="230" height="120" rx="10" fill="#f4fbfe"/>
<text x="280" y="130" font-size="14" fill="#1f82a6">Expenses</text>

<rect x="290" y="190" width="20" height="30" fill="#0f91b5"/>
<rect x="330" y="170" width="20" height="50" fill="#0f91b5"/>
<rect x="370" y="180" width="20" height="40" fill="#0f91b5"/>
<rect x="410" y="160" width="20" height="60" fill="#0f91b5"/>

<!-- Transactions -->

<rect x="20" y="250" width="480" height="70" rx="10" fill="#f4fbfe"/>

<text x="30" y="275" font-size="14" fill="#333">Groceries</text> <text x="450" y="275" font-size="14" fill="#d9534f">-₹800</text>

<text x="30" y="295" font-size="14" fill="#333">Salary</text> <text x="450" y="295" font-size="14" fill="#28a745">+₹35,000</text>

</svg>
