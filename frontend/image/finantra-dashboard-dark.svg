<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- background gradient -->

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0f172a"/>
<stop offset="100%" stop-color="#1e293b"/>
</linearGradient>

<!-- card gradient -->

<linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#1f2937"/>
<stop offset="100%" stop-color="#111827"/>
</linearGradient>

<!-- glow -->

<filter id="glow">
<feGaussianBlur stdDeviation="3" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

<!-- soft shadow -->

<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#00000080"/>
</filter>

</defs>

<!-- dashboard background -->

<rect width="640" height="400" rx="24" fill="url(#bg)"/>

<!-- main dashboard card -->

<rect x="110" y="80" width="420" height="240" rx="18"
fill="url(#card)" filter="url(#shadow)"/>

<!-- balance card -->

<rect x="130" y="100" width="380" height="70" rx="12"
fill="#0f172a"/>

<text x="150" y="125" font-size="16" fill="#94a3b8">
Total Balance
</text>

<text x="150" y="155" font-size="30" font-weight="bold" fill="#22d3ee">
₹52,400
</text>

<!-- income chart -->

<rect x="130" y="190" width="180" height="100" rx="12"
fill="#020617"/>

<text x="145" y="210" font-size="14" fill="#94a3b8">Income</text>

<polyline
points="145,260 170,235 195,240 220,210 245,225 285,200"
fill="none"
stroke="#22d3ee"
stroke-width="3"
filter="url(#glow)"
/>

<!-- expenses chart -->

<rect x="330" y="190" width="180" height="100" rx="12"
fill="#020617"/>

<text x="345" y="210" font-size="14" fill="#94a3b8">Expenses</text>

<rect x="360" y="240" width="16" height="40" fill="#38bdf8"/>
<rect x="390" y="225" width="16" height="55" fill="#38bdf8"/>
<rect x="420" y="235" width="16" height="45" fill="#38bdf8"/>
<rect x="450" y="210" width="16" height="70" fill="#38bdf8"/>

<!-- floating savings card -->

<rect x="430" y="40" width="160" height="70" rx="14"
fill="#0f172a" filter="url(#shadow)"/>

<text x="450" y="70" font-size="15" fill="#94a3b8">
Savings
</text>

<text x="450" y="95" font-size="22" fill="#4ade80">
+12%
</text>

<!-- floating transaction card -->

<rect x="40" y="220" width="160" height="80" rx="14"
fill="#0f172a" filter="url(#shadow)"/>

<text x="60" y="250" font-size="13" fill="#94a3b8">
Groceries
</text>

<text x="140" y="250" font-size="13" fill="#f87171">
-₹800
</text>

<text x="60" y="275" font-size="13" fill="#94a3b8">
Salary
</text>

<text x="140" y="275" font-size="13" fill="#4ade80">
+₹35,000
</text>

</svg>
