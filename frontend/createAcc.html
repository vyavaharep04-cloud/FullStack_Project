<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account - FinanTra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="createAcc.css">
</head>
<body>

    <header class="main-header">
        <img src="image/FinanTra_logo (2).png" alt="FinanTra Logo" class="logo">
        <h1 class="brandtitle">Finan<span>Tra</span>
        </h1>
    </header>

    <!-- CREATE ACCOUNT SECTION -->
    <section class="createSection">

        <div class="createCard">
            <h2>Create Account</h2>

            <form>

                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name">

                <label>Email</label>
                <input type="email" placeholder="Enter your email">

                <label>Password</label>
                <input type="password" placeholder="Enter password">

                <label>Confirm Password</label>
                <input type="password" placeholder="Re-enter password">

                <button class="create-btn">Create Account</button>

                <div class="bottom-link">
                    <a href="landingpage.html">Already have an account? Sign In</a>
                </div>

            </form>
        </div>

    </section>

</body>
</html>
