<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account - FinanTra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- <link rel="stylesheet" href="createAcc.css"> -->
     <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <header class="main-header">
        <img src="image/FinanTra_logo (2).png" alt="FinanTra Logo" class="logo">
        <h1 class="brandtitle">Finan<span>Tra</span>
        </h1>
    </header>

    <!-- CREATE ACCOUNT SECTION -->
    <section class="auth-section">

        <div class="auth-card">
            <h2>Create Account</h2>

            <form class="auth-form createForm">

                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name">

                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email">

                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">

                <label>Confirm Password</label>
                <input type="password" id="confirmpassword" placeholder="Re-enter password">

                <button class="auth-btn">Create Account</button>

                <div class="bottom-link">
                    <a href="landingpage.html">Already have an account? Sign In</a>
                </div>

            </form>
        </div>

    </section>
    <footer class="main-footer">
    © 2026 FinanTra | Designed for Academic Purpose
    </footer>
    <script src="js/auth.js"></script>

</body>
</html>
