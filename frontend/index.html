<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Welcome to personal Finance tracker</h2>
    <form id="financeForm">
        <h3>Finance tracker</h3>
        <label for="name">Name</label>
        <input type="text" placeholder="Enter your name" id="name" >
        <br><br>
        
        <label for="inc">Income</label>
        <input type="number" placeholder="Enter your income" id="inc">
        <br><br>
        
        <p><b>Your Expenses are mainly from which Elements</b></p>
        <div class="checkbox-group">
            <div class="checkbox-item">
                <input type="checkbox" id="shop" name="Shopping">
                <label for="shop">Shopping</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" name="movie" id="movie">
                <label for="movie">Movie</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="food" name="Food">
                <label for="food">Food</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" name="trip" id="trip">
                <label for="trip">Trips</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" name="others" id="others">
                <label for="others">Others</label>
            </div>
        </div>

        <!-- Dynamic expense fields -->
        <div id="expenseFields"></div>
        <br>

        <label for="totalExp">Total Expenses: <span id="totalExpValue">0</span></label>
        <input type="number" id="totalExp" readonly>
        <br><br>
        
        <button type="submit">Submit</button>
    </form>

    <script>
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    const expenseFieldsContainer = document.getElementById('expenseFields');
    const totalExpInput = document.getElementById('totalExp');
    const totalExpValue = document.getElementById('totalExpValue');
    const expenseInputs = {};
    const nameInput = document.getElementById('name');
    const incomeInput = document.getElementById('inc');

    // Make name and income compulsory
    nameInput.required = true;
    incomeInput.required = true;
    
    // Visual indication they're required
    nameInput.placeholder = "Enter your name *required";
    incomeInput.placeholder = "Enter your income *required";

    // Checkbox event listeners
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const category = this.id;
            const isChecked = this.checked;
            
            if (isChecked) {
                createExpenseField(category);
            } else {
                removeExpenseField(category);
            }
            updateTotalExpenses();
        });
    });

    function createExpenseField(category) {
        if (expenseInputs[category]) return;
        
        const fieldDiv = document.createElement('div');
        fieldDiv.className = 'expense-field';
        fieldDiv.id = `field-${category}`;
        
        fieldDiv.innerHTML = `
            <label for="${category}-exp">${category.charAt(0).toUpperCase() + category.slice(1)} Expense:</label>
            <input type="number" id="${category}-exp" placeholder="Enter ${category} expense" min="0">
        `;
        
        expenseFieldsContainer.appendChild(fieldDiv);
        expenseInputs[category] = fieldDiv.querySelector(`#${category}-exp`);
        expenseInputs[category].addEventListener('input', updateTotalExpenses);
    }

    function removeExpenseField(category) {
        const fieldDiv = document.getElementById(`field-${category}`);
        if (fieldDiv) {
            fieldDiv.remove();
            delete expenseInputs[category];
        }
        updateTotalExpenses();
    }

    function updateTotalExpenses() {
        let total = 0;
        Object.values(expenseInputs).forEach(input => {
            const value = parseFloat(input.value) || 0;
            total += value;
        });
        totalExpInput.value = total;
        totalExpValue.textContent = total;
    }

    // Enhanced form submission with validation
    document.getElementById('financeForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Check if name and income are filled
        if (!nameInput.value.trim()) {
            alert('Please enter your name (required field)');
            nameInput.focus();
            return;
        }
        
        if (!incomeInput.value || incomeInput.value <= 0) {
            alert('Please enter a valid income amount (required field)');
            incomeInput.focus();
            return;
        }
        
        const name = nameInput.value;
        const income = parseFloat(incomeInput.value);
        const expenses = parseFloat(totalExpInput.value) || 0;
        const savings = income - expenses;
        
        alert(`${name}, your savings: ₹${savings.toFixed(2)} 
Income: ₹${income.toFixed(2)} 
Expenses: ₹${expenses.toFixed(2)}`);
    });
    </script>
</body>
</html>
