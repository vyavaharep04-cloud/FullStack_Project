<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - FinanTra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="password.css">
</head>
<body>

   <header class="main-header">
        <img src="image/FinanTra_logo (2).png" alt="FinanTra Logo" class="logo">
        <h1 class="brandtitle">Finan<span>Tra</span>
        </h1>
    </header>

    <!-- SECTION -->
    <section class="forgotSection">

        <div class="forgotCard">
            <h2>Forgot Password</h2>

            <p class="info-text">
                Enter your registered email address and we will send you a reset link.
            </p>

            <form>
                <label>Email</label>
                <input type="email" placeholder="Enter your email">

                <button class="reset-btn">Send Reset Link</button>

                <div class="bottom-link">
                    <a href="landingpage.html">Back to Sign In</a>
                </div>
            </form>
        </div>

    </section>

</body>
</html>
