<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - FinanTra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" href="image/FinanTra_logo (2).png" type="image/png">
</head>
<body>

   <header class="main-header">
        <img src="image/FinanTra_logo (2).png" alt="FinanTra Logo" class="logo">
        <h1 class="brandtitle">Finan<span>Tra</span>
        </h1>
    </header>

    <!-- SECTION -->
    <section class="auth-section">

        <div class="auth-card">
            <h2>Forgot Password</h2>

            <p class="info-text">
                Enter your registered email address and we will send you a reset link.
            </p>

            <form class="auth-form resetForm">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email">

                <button class="auth-btn">Send Reset Link</button>

                <div class="bottom-link">
                    <a href="login.html">Back to Sign In</a>
                </div>
            </form>
        </div>

    </section>
     <footer class="main-footer">
      © 2026 FinanTra | Track • Save • Grow
    </footer>
    <script src="js/auth.js"></script>
</body>
</html>
